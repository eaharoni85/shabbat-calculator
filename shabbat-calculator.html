<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>מחשבון זמני שהות ילדים - משפחת אהרוני</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #19202a;
      --muted: #667080;
      --line: #dfe5ee;
      --soft: #f6f8fb;
      --paper: #ffffff;
      --blue: #245d84;
      --blue-soft: #edf5fa;
      --green: #32745a;
      --green-soft: #ecf6f1;
      --rose: #a84d62;
      --rose-soft: #fbeef2;
      --gold: #9b6a12;
      --gold-soft: #fff7e5;
      --shadow: 0 14px 34px rgba(29, 39, 56, 0.08);
      --shadow-soft: 0 8px 18px rgba(29, 39, 56, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #edf4f8 0, #f8fafc 260px),
        linear-gradient(90deg, rgba(50, 116, 90, 0.06), rgba(168, 77, 98, 0.05)),
        #f8fafc;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
      padding: 4px 2px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4.4vw, 48px);
      line-height: 1.12;
      letter-spacing: 0;
      max-width: 780px;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 660px;
    }

    .today {
      flex: 0 0 auto;
      padding: 11px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .calculator {
      padding: 24px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1px solid #ccd6e1;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
      box-shadow: 0 1px 0 rgba(29, 39, 56, 0.03);
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29, 95, 149, 0.15);
    }

    .date-control {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
    }

    .date-control input[type="date"] {
      position: absolute;
      inset: auto 0 0 auto;
      width: 48px;
      height: 48px;
      opacity: 0;
      pointer-events: none;
    }

    .date-picker-button {
      width: 48px;
      min-width: 48px;
      height: 48px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 20px;
      line-height: 1;
      background: var(--soft);
    }

    .date-error {
      min-height: 18px;
      color: var(--rose);
      font-size: 12px;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      min-height: 40px;
      border: 1px solid #c5ceda;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      border-color: var(--blue);
      background: var(--blue-soft);
      transform: translateY(-1px);
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 18px rgba(36, 93, 132, 0.16);
    }

    .danger {
      color: var(--rose);
      border-color: rgba(181, 72, 95, 0.36);
    }

    .result {
      margin-top: 20px;
      display: grid;
      gap: 14px;
    }

    .answer {
      border-radius: 8px;
      padding: 20px;
      color: #fff;
      background: linear-gradient(135deg, #32745a, #245d84);
      min-height: 145px;
      display: grid;
      align-content: center;
      gap: 8px;
      box-shadow: var(--shadow-soft);
    }

    .answer.mom {
      background: linear-gradient(135deg, #a84d62, #245d84);
    }

    .answer.exception {
      background: linear-gradient(135deg, #9b6a12, #245d84);
    }

    .answer .small {
      font-size: 14px;
      opacity: 0.88;
    }

    .answer strong {
      font-size: clamp(25px, 4.8vw, 42px);
      line-height: 1.12;
    }

    .answer .dates {
      font-size: 21px;
      font-weight: 700;
    }

    .week-view {
      display: grid;
      gap: 10px;
    }

    .week-day {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(29, 39, 56, 0.03);
    }

    .week-day::before {
      content: "";
      position: absolute;
      inset: 0 0 0 auto;
      width: 4px;
      background: #cbd6df;
    }

    .week-day.selected {
      border-color: rgba(29, 95, 149, 0.55);
      background: var(--blue-soft);
      box-shadow: var(--shadow-soft);
    }

    .week-day.holiday {
      border-color: rgba(162, 107, 0, 0.42);
      background: var(--gold-soft);
    }

    .week-day.selected::before {
      background: var(--blue);
    }

    .week-day.holiday::before {
      background: var(--gold);
    }

    .week-name {
      font-weight: 700;
      color: var(--ink);
      font-size: 18px;
    }

    .week-meta {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .week-date,
    .week-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .week-owner {
      justify-self: end;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }

    .week-owner.mom {
      background: var(--rose-soft);
      color: var(--rose);
    }

    .week-owner.dad {
      background: var(--green-soft);
      color: var(--green);
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 84px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric b {
      font-size: 18px;
    }

    .panel {
      padding: 20px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 21px;
      letter-spacing: 0;
    }

    .empty {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .holiday-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .holiday-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 1px 0 rgba(29, 39, 56, 0.03);
    }

    .holiday-item.next {
      border-color: rgba(29, 95, 149, 0.45);
      background: var(--blue-soft);
      box-shadow: var(--shadow-soft);
    }

    .holiday-info {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .holiday-name {
      font-weight: 700;
      color: var(--ink);
    }

    .holiday-meta,
    .holiday-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .holiday-owner {
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--ink);
      font-weight: 700;
      white-space: nowrap;
    }

    .holiday-owner.mom {
      background: var(--rose-soft);
      color: var(--rose);
    }

    .holiday-owner.dad {
      background: var(--green-soft);
      color: var(--green);
    }

    @media (max-width: 820px) {
      header,
      main {
        display: grid;
        grid-template-columns: 1fr;
      }

      .today {
        justify-self: start;
      }

      .field-grid,
      .details {
        grid-template-columns: 1fr;
      }

      .week-day {
        grid-template-columns: 1fr;
      }

      .week-owner {
        justify-self: start;
      }

      .holiday-item {
        grid-template-columns: 1fr;
      }

      .holiday-owner {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>מחשבון זמני שהות ילדים - משפחת אהרוני</h1>
        <p class="subtitle">בחר תאריך וקבל את כל השבוע: ימים קבועים, חמישי מתחלף, שישי-שבת לסירוגין, וחגים שגוברים על הימים הרגילים.</p>
      </div>
      <div class="today" id="todayLabel"></div>
    </header>

    <main>
      <section class="calculator" aria-labelledby="calcTitle">
        <h2 id="calcTitle">בדיקת שבוע</h2>
        <div class="field-grid">
          <label>
            תאריך לבדיקה
            <span class="date-control">
              <input id="checkDateText" type="text" inputmode="numeric" placeholder="DD/MM/YYYY" autocomplete="off" />
              <button class="date-picker-button" id="checkDatePicker" type="button" aria-label="פתח לוח שנה">▦</button>
              <input id="checkDate" type="date" aria-hidden="true" tabindex="-1" />
            </span>
            <span class="date-error" id="checkDateError"></span>
          </label>
          <button class="primary" id="calculateBtn">חשב</button>
        </div>

        <div class="quick-actions">
          <button id="todayBtn">היום</button>
          <button id="nextWeekendBtn">שבוע הסופ"ש הקרוב</button>
          <button id="plusWeekBtn">שבוע קדימה</button>
        </div>

        <div class="result" aria-live="polite">
          <div class="answer" id="answerBox">
            <span class="small" id="answerContext"></span>
            <strong id="weekTitle"></strong>
            <span class="dates" id="weekRange"></span>
          </div>

          <div class="week-view" id="weekView"></div>

          <div class="details">
            <div class="metric">
              <span>שישי-שבת</span>
              <b id="methodText"></b>
            </div>
            <div class="metric">
              <span>חמישי</span>
              <b id="weeksText"></b>
            </div>
            <div class="metric">
              <span>הערת חגים</span>
              <b id="nextOwnerText"></b>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">החגים הקרובים</h2>
        <div class="holiday-list" id="holidayList" aria-live="polite"></div>
      </section>
    </main>
  </div>

  <script>
    const baseWeekend = parseDate("2026-06-19");
    const owners = {
      dad: "אלירן",
      mom: "עדי"
    };

    const baseHebrewYear = 5786;
    const hebrewFormatter = new Intl.DateTimeFormat("en-u-ca-hebrew", {
      day: "numeric",
      month: "long",
      year: "numeric"
    });

    const holidayPatterns = {
      0: {
        roshHashana: "dad",
        yomKippur: "mom",
        sukkotA: "dad",
        sukkotB: "mom",
        purim1: "mom",
        purim2: "dad",
        pesachA: "mom",
        pesachB: "dad",
        yomHaatzmaut: "dad",
        shavuot: "mom"
      },
      1: {
        roshHashana: "mom",
        yomKippur: "dad",
        sukkotA: "mom",
        sukkotB: "dad",
        purim1: "mom",
        purim2: "dad",
        pesachA: "dad",
        pesachB: "mom",
        yomHaatzmaut: "mom",
        shavuot: "dad"
      }
    };

    const els = {
      todayLabel: document.querySelector("#todayLabel"),
      checkDate: document.querySelector("#checkDate"),
      checkDateText: document.querySelector("#checkDateText"),
      checkDatePicker: document.querySelector("#checkDatePicker"),
      checkDateError: document.querySelector("#checkDateError"),
      calculateBtn: document.querySelector("#calculateBtn"),
      todayBtn: document.querySelector("#todayBtn"),
      nextWeekendBtn: document.querySelector("#nextWeekendBtn"),
      plusWeekBtn: document.querySelector("#plusWeekBtn"),
      answerBox: document.querySelector("#answerBox"),
      answerContext: document.querySelector("#answerContext"),
      weekTitle: document.querySelector("#weekTitle"),
      weekRange: document.querySelector("#weekRange"),
      weekView: document.querySelector("#weekView"),
      methodText: document.querySelector("#methodText"),
      weeksText: document.querySelector("#weeksText"),
      nextOwnerText: document.querySelector("#nextOwnerText"),
      holidayList: document.querySelector("#holidayList")
    };

    const weekdayFormatter = new Intl.DateTimeFormat("he-IL", {
      weekday: "long",
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

    let exceptions = loadExceptions();

    initialize();

    function initialize() {
      const today = stripTime(new Date());
      els.todayLabel.textContent = `היום: ${formatWeekdayDate(today)}`;
      setDateControl("checkDate", today);
      calculate();
      renderHolidayList(today);

      els.calculateBtn.addEventListener("click", calculate);
      setupDateControl("checkDate", calculate);
      els.todayBtn.addEventListener("click", () => setDateAndCalculate(today));
      els.nextWeekendBtn.addEventListener("click", () => setDateAndCalculate(getWeekendFriday(today)));
      els.plusWeekBtn.addEventListener("click", () => {
        const current = commitDateControl("checkDate");
        if (!current) return;
        current.setDate(current.getDate() + 7);
        setDateAndCalculate(current);
      });
    }

    function calculate() {
      const selected = commitDateControl("checkDate");
      if (!selected) return;

      const week = buildWeek(selected);
      const selectedDay = week.days.find(day => sameDate(day.date, selected));
      const weekendOwner = getRegularOwner(week.friday);
      const thursdayOwner = oppositeOwner(weekendOwner);
      const hasHolidayOverride = week.days.some(day => day.holiday && !day.useRegularWeekend);

      els.answerBox.className = `answer ${selectedDay.owner === "mom" ? "mom" : ""} ${selectedDay.holiday || selectedDay.exception ? "exception" : ""}`;
      els.answerContext.textContent = selectedDay.holiday && !selectedDay.useRegularWeekend
        ? "היום שנבחר מושפע מחג - חג גובר על הימים הרגילים"
        : selectedDay.exception
          ? "היום שנבחר לפי חריג ידני"
          : "השבוע של התאריך שנבחר";
      els.weekTitle.textContent = `שבוע ${formatDate(week.start)} - ${formatDate(week.end)}`;
      els.weekRange.textContent = `ביום שנבחר: ${owners[selectedDay.owner]}`;
      els.methodText.textContent = owners[weekendOwner];
      els.weeksText.textContent = owners[thursdayOwner];
      els.nextOwnerText.textContent = hasHolidayOverride ? "חג גובר" : "אין חג השבוע";
      renderWeekView(week, selected);
      renderHolidayList(selected);
    }

    function buildWeek(selected) {
      const start = getWeekSunday(selected);
      const friday = addDays(start, 5);
      const weekendOwner = getRegularOwner(friday);
      const days = [];

      for (let index = 0; index < 7; index += 1) {
        const date = addDays(start, index);
        days.push(getDayCustody(date, start, weekendOwner));
      }

      return {
        start,
        end: addDays(start, 6),
        friday,
        days
      };
    }

    function getDayCustody(date, weekStart, weekendOwner) {
      const day = date.getDay();
      const regularOwner = getRegularDayOwner(day, weekendOwner);
      const exception = findExceptionForDate(date);
      const holiday = getHolidayForDate(date);
      const useRegularWeekend = holiday
        && holiday.keepWeekendRegular
        && selectedIsWeekend(date);
      const owner = exception
        ? exception.owner
        : holiday && !useRegularWeekend
          ? holiday.owner
          : regularOwner;

      return {
        date,
        dayName: getShortDayName(date),
        owner,
        regularOwner,
        exception,
        holiday,
        useRegularWeekend
      };
    }

    function getRegularDayOwner(day, weekendOwner) {
      if (day === 0 || day === 2) return "mom";
      if (day === 1 || day === 3) return "dad";
      if (day === 4) return oppositeOwner(weekendOwner);
      return weekendOwner;
    }

    function renderWeekView(week, selected) {
      els.weekView.innerHTML = "";

      week.days.forEach(day => {
        const item = document.createElement("div");
        item.className = `week-day ${sameDate(day.date, selected) ? "selected" : ""} ${day.holiday && !day.useRegularWeekend ? "holiday" : ""}`;

        const name = document.createElement("div");
        name.className = "week-name";
        name.textContent = day.dayName;

        const meta = document.createElement("div");
        meta.className = "week-meta";

        const date = document.createElement("div");
        date.className = "week-date";
        date.textContent = formatDate(day.date);
        meta.append(date);

        const note = getDayNote(day);
        if (note) {
          const noteEl = document.createElement("div");
          noteEl.className = "week-note";
          noteEl.textContent = note;
          meta.append(noteEl);
        }

        const owner = document.createElement("div");
        owner.className = `week-owner ${day.owner}`;
        owner.textContent = owners[day.owner];

        item.append(name, meta, owner);
        els.weekView.append(item);
      });
    }

    function getDayNote(day) {
      if (day.exception) return `חריג ידני: ${day.exception.name}`;
      if (day.holiday && day.useRegularWeekend) return `${day.holiday.name} - סוף שבוע נשאר לפי הסדר הקבוע`;
      if (day.holiday) return `${day.holiday.name} - חג גובר על הימים הרגילים`;
      if (day.date.getDay() === 4) return "חמישי מתחלף הפוך משישי-שבת";
      if (day.date.getDay() === 5 || day.date.getDay() === 6) return "שישי-שבת לפי הסדר המתחלף";
      return "";
    }

    function getRegularOwner(friday) {
      const weeks = Math.round((friday - baseWeekend) / (7 * 24 * 60 * 60 * 1000));
      return modulo(weeks, 2) === 0 ? "mom" : "dad";
    }

    function oppositeOwner(owner) {
      return owner === "mom" ? "dad" : "mom";
    }

    function getWeekSunday(date) {
      const sunday = stripTime(new Date(date));
      sunday.setDate(sunday.getDate() - sunday.getDay());
      return sunday;
    }

    function getWeekendFriday(date) {
      const day = date.getDay();
      const friday = stripTime(new Date(date));

      if (day === 5) return friday;
      if (day === 6) {
        friday.setDate(friday.getDate() - 1);
        return friday;
      }

      const daysUntilFriday = modulo(5 - day, 7);
      friday.setDate(friday.getDate() + daysUntilFriday);
      return friday;
    }

    function selectedIsWeekend(date) {
      return date.getDay() === 5 || date.getDay() === 6;
    }

    function sameDate(first, second) {
      return first.getFullYear() === second.getFullYear()
        && first.getMonth() === second.getMonth()
        && first.getDate() === second.getDate();
    }

    function getShortDayName(date) {
      return ["א׳", "ב׳", "ג׳", "ד׳", "ה׳", "ו׳", "ש׳"][date.getDay()];
    }

    function getResultContext(selected, matchedException, activeHoliday, useRegularWeekend) {
      if (matchedException) return `לפי חריג: ${matchedException.name}`;
      if (activeHoliday && useRegularWeekend) return `${activeHoliday.name} - סוף שבוע נשאר לפי הסדר הקבוע`;
      if (activeHoliday) return `${activeHoliday.name} (${activeHoliday.hebrewYearLabel})`;
      return selectedIsWeekend(selected) ? "התאריך בתוך סוף השבוע הזה" : "סוף השבוע הקרוב לתאריך";
    }

    function renderHolidayList(fromDate) {
      const upcomingHolidays = getUpcomingHolidays(fromDate, 8);
      els.holidayList.innerHTML = "";

      if (upcomingHolidays.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "לא נמצאו חגים קרובים.";
        els.holidayList.append(empty);
        return;
      }

      upcomingHolidays.forEach((holiday, index) => {
        const item = document.createElement("div");
        item.className = `holiday-item ${index === 0 ? "next" : ""}`;

        const info = document.createElement("div");
        info.className = "holiday-info";

        const name = document.createElement("div");
        name.className = "holiday-name";
        name.textContent = index === 0 ? `החג הבא: ${holiday.name}` : holiday.name;

        const meta = document.createElement("div");
        meta.className = "holiday-meta";
        meta.textContent = `${formatDateRange(holiday.start, holiday.end)} · ${holiday.hebrewYearLabel}`;

        info.append(name, meta);

        const noteText = getHolidayListNote(holiday);
        if (noteText) {
          const note = document.createElement("div");
          note.className = "holiday-note";
          note.textContent = noteText;
          info.append(note);
        }

        const owner = document.createElement("div");
        owner.className = `holiday-owner ${holiday.owner}`;
        owner.textContent = getHolidayListOwner(holiday);

        item.append(info, owner);
        els.holidayList.append(item);
      });
    }

    function getUpcomingHolidays(fromDate, count) {
      const holidays = [];
      const seen = new Set();
      const start = stripTime(new Date(fromDate));

      for (let offset = 0; offset < 760 && holidays.length < count; offset += 1) {
        const date = addDays(start, offset);
        const holiday = getHolidayForDate(date);

        if (!holiday || holiday.end < start) continue;

        const key = `${holiday.hebrewYear}-${holiday.id}`;
        if (seen.has(key)) continue;

        seen.add(key);
        holidays.push(holiday);
      }

      return holidays;
    }

    function getHolidayListOwner(holiday) {
      if (holiday.id === "hanukkah") return "לפי השגרה";
      return owners[holiday.owner];
    }

    function getHolidayListNote(holiday) {
      if (holiday.id === "hanukkah") return "בחנוכה נשארים זמני השהות הרגילים.";
      if (holiday.keepWeekendRegular) return "סופי שבוע בתוך החג נשארים לפי סדר השבתות.";
      return "";
    }

    function getHolidayForRange(start, end) {
      for (let date = stripTime(new Date(start)); date <= end; date = addDays(date, 1)) {
        const holiday = getHolidayForDate(date);
        if (holiday) return holiday;
      }

      return null;
    }

    function getHolidayForDate(date) {
      const holiday = getHolidayRule(date);
      if (!holiday) return null;

      const range = getHolidayRange(date, holiday.id);
      return {
        ...holiday,
        start: range.start,
        end: range.end
      };
    }

    function getHolidayRange(date, holidayId) {
      let start = stripTime(new Date(date));
      let end = stripTime(new Date(date));

      while (sameHoliday(addDays(start, -1), holidayId)) {
        start = addDays(start, -1);
      }

      while (sameHoliday(addDays(end, 1), holidayId)) {
        end = addDays(end, 1);
      }

      return { start, end };
    }

    function sameHoliday(date, holidayId) {
      const holiday = getHolidayRule(date);
      return Boolean(holiday && holiday.id === holidayId);
    }

    function getHolidayRule(date) {
      const hebrew = getHebrewDate(date);
      const pattern = holidayPatterns[modulo(hebrew.year - baseHebrewYear, 2)];
      const hebrewYearLabel = getHebrewYearLabel(hebrew.year);
      const createHoliday = (id, name, owner, keepWeekendRegular = false) => ({
        id,
        name,
        owner,
        keepWeekendRegular,
        hebrewYear: hebrew.year,
        hebrewYearLabel
      });

      if (hebrew.month === "Tishri" && hebrew.day >= 1 && hebrew.day <= 2) {
        return createHoliday("roshHashana", "ראש השנה", pattern.roshHashana);
      }

      if (hebrew.month === "Tishri" && hebrew.day === 10) {
        return createHoliday("yomKippur", "יום כיפור", pattern.yomKippur);
      }

      if (hebrew.month === "Tishri" && hebrew.day >= 14 && hebrew.day <= 18) {
        return createHoliday("sukkotA", "סוכות - חלק א׳", pattern.sukkotA, true);
      }

      if (hebrew.month === "Tishri" && hebrew.day >= 19 && hebrew.day <= 22) {
        return createHoliday("sukkotB", "סוכות - חלק ב׳", pattern.sukkotB, true);
      }

      if (isHanukkah(date)) {
        return createHoliday("hanukkah", "חנוכה - זמני שהות רגילים", getRegularOwner(getWeekendFriday(date)), true);
      }

      if (isPurimMonth(hebrew.month) && hebrew.day === 14) {
        return createHoliday("purim1", "פורים - יום 1", pattern.purim1);
      }

      if (isPurimMonth(hebrew.month) && hebrew.day === 15) {
        return createHoliday("purim2", "פורים - יום 2", pattern.purim2);
      }

      if (hebrew.month === "Nisan" && hebrew.day >= 14 && hebrew.day <= 17) {
        return createHoliday("pesachA", "פסח - מחצית ראשונה", pattern.pesachA, true);
      }

      if (hebrew.month === "Nisan" && hebrew.day >= 18 && hebrew.day <= 21) {
        return createHoliday("pesachB", "פסח - מחצית שנייה", pattern.pesachB, true);
      }

      if (isYomHaatzmaut(date, hebrew)) {
        return createHoliday("yomHaatzmaut", "יום העצמאות", pattern.yomHaatzmaut);
      }

      if (hebrew.month === "Sivan" && hebrew.day >= 5 && hebrew.day <= 6) {
        return createHoliday("shavuot", "שבועות", pattern.shavuot);
      }

      return null;
    }

    function getHebrewDate(date) {
      const parts = hebrewFormatter.formatToParts(date);
      return {
        day: Number(parts.find(part => part.type === "day").value),
        month: parts.find(part => part.type === "month").value,
        year: Number(parts.find(part => part.type === "year").value)
      };
    }

    function isPurimMonth(month) {
      return month === "Adar" || month === "Adar II";
    }

    function isHanukkah(date) {
      for (let daysBack = 0; daysBack < 8; daysBack += 1) {
        const hebrew = getHebrewDate(addDays(date, -daysBack));
        if (hebrew.month === "Kislev" && hebrew.day === 25) return true;
      }

      return false;
    }

    function isYomHaatzmaut(date, hebrew) {
      if (hebrew.month !== "Iyar" || hebrew.day < 3 || hebrew.day > 6) return false;

      const fiveIyar = addDays(date, 5 - hebrew.day);
      const fiveIyarDay = fiveIyar.getDay();
      let observedDay = 5;

      if (fiveIyarDay === 5) observedDay = 3;
      if (fiveIyarDay === 6) observedDay = 4;
      if (fiveIyarDay === 1) observedDay = 6;

      return hebrew.day === observedDay;
    }

    function getHebrewYearLabel(year) {
      const knownYears = {
        5786: "תשפ״ו",
        5787: "תשפ״ז",
        5788: "תשפ״ח",
        5789: "תשפ״ט",
        5790: "תש״ץ",
        5791: "תשצ״א",
        5792: "תשצ״ב",
        5793: "תשצ״ג",
        5794: "תשצ״ד",
        5795: "תשצ״ה",
        5796: "תשצ״ו"
      };

      return knownYears[year] || `שנה עברית ${year}`;
    }

    function findException(friday, saturday, selected) {
      return exceptions.find(item => {
        const start = parseDate(item.start);
        const end = parseDate(item.end);
        return rangesOverlap(friday, saturday, start, end) || (selected >= start && selected <= end);
      });
    }

    function findExceptionForDate(date) {
      return exceptions.find(item => {
        const start = parseDate(item.start);
        const end = parseDate(item.end);
        return date >= start && date <= end;
      });
    }

    function rangesOverlap(aStart, aEnd, bStart, bEnd) {
      return aStart <= bEnd && bStart <= aEnd;
    }

    function loadExceptions() {
      try {
        return JSON.parse(localStorage.getItem("shabbatCalculatorExceptions") || "[]");
      } catch {
        return [];
      }
    }

    function setupDateControl(name, onCommit) {
      const hiddenInput = els[name];
      const textInput = els[`${name}Text`];
      const pickerButton = els[`${name}Picker`];

      hiddenInput.addEventListener("change", () => {
        const date = parseDate(hiddenInput.value);
        if (date) {
          setDateControl(name, date);
          if (onCommit) onCommit();
        }
      });

      textInput.addEventListener("input", () => {
        textInput.value = formatDateTyping(textInput.value);
        clearDateError(name);
      });

      textInput.addEventListener("blur", () => {
        const date = commitDateControl(name);
        if (date && onCommit) onCommit();
      });

      textInput.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          const date = commitDateControl(name);
          if (date && onCommit) onCommit();
        }
      });

      pickerButton.addEventListener("click", () => {
        if (hiddenInput.showPicker) {
          hiddenInput.showPicker();
        } else {
          hiddenInput.click();
        }
      });
    }

    function setDateControl(name, date) {
      els[name].value = toInputDate(date);
      els[`${name}Text`].value = formatDate(date);
      clearDateError(name);
    }

    function commitDateControl(name) {
      const textInput = els[`${name}Text`];
      const parsedDate = parseDisplayDate(textInput.value);

      if (!parsedDate) {
        setDateError(name, "יש להזין תאריך בפורמט DD/MM/YYYY");
        return null;
      }

      setDateControl(name, parsedDate);
      return parsedDate;
    }

    function clearDateError(name) {
      els[`${name}Error`].textContent = "";
      els[`${name}Text`].setAttribute("aria-invalid", "false");
    }

    function setDateError(name, message) {
      els[`${name}Error`].textContent = message;
      els[`${name}Text`].setAttribute("aria-invalid", "true");
    }

    function parseDate(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function parseDisplayDate(value) {
      const match = value.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (!match) return null;

      const day = Number(match[1]);
      const month = Number(match[2]);
      const year = Number(match[3]);
      const date = new Date(year, month - 1, day);

      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) {
        return null;
      }

      return date;
    }

    function formatDateTyping(value) {
      const digits = value.replace(/\D/g, "").slice(0, 8);
      const parts = [digits.slice(0, 2), digits.slice(2, 4), digits.slice(4, 8)].filter(Boolean);
      return parts.join("/");
    }


    function toInputDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function formatDate(date) {
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      return `${day}/${month}/${date.getFullYear()}`;
    }

    function formatDateRange(start, end) {
      return start.getTime() === end.getTime() ? formatDate(start) : `${formatDate(start)} - ${formatDate(end)}`;
    }

    function formatWeekdayDate(date) {
      const weekday = weekdayFormatter.formatToParts(date).find(part => part.type === "weekday").value;
      return `${weekday}, ${formatDate(date)}`;
    }

    function addDays(date, days) {
      const next = stripTime(new Date(date));
      next.setDate(next.getDate() + days);
      return next;
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function modulo(value, divisor) {
      return ((value % divisor) + divisor) % divisor;
    }

    function setDateAndCalculate(date) {
      setDateControl("checkDate", date);
      calculate();
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
