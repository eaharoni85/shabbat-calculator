<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מחשבון שבתות</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5a6573;
      --line: #d9dee7;
      --soft: #f3f6f9;
      --paper: #ffffff;
      --blue: #1d5f95;
      --green: #2f7d58;
      --rose: #b5485f;
      --gold: #a26b00;
      --shadow: 0 18px 44px rgba(26, 35, 50, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans Hebrew", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(29, 95, 149, 0.09), transparent 34%),
        linear-gradient(90deg, rgba(47, 125, 88, 0.08), rgba(181, 72, 95, 0.08)),
        #f8fafc;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.6;
      max-width: 660px;
    }

    .today {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .calculator {
      padding: 22px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd3de;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(29, 95, 149, 0.15);
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      min-height: 40px;
      border: 1px solid #c5ceda;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--blue);
    }

    .primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      font-weight: 700;
    }

    .danger {
      color: var(--rose);
      border-color: rgba(181, 72, 95, 0.36);
    }

    .result {
      margin-top: 20px;
      display: grid;
      gap: 14px;
    }

    .answer {
      border-radius: 8px;
      padding: 22px;
      color: #fff;
      background: var(--green);
      min-height: 170px;
      display: grid;
      align-content: center;
      gap: 8px;
    }

    .answer.mom {
      background: var(--rose);
    }

    .answer.exception {
      background: var(--gold);
    }

    .answer .small {
      font-size: 14px;
      opacity: 0.88;
    }

    .answer strong {
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1;
    }

    .answer .dates {
      font-size: 21px;
      font-weight: 700;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 84px;
      display: grid;
      align-content: center;
      gap: 6px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .metric b {
      font-size: 18px;
    }

    .panel {
      padding: 18px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 21px;
      letter-spacing: 0;
    }

    .rules {
      display: grid;
      gap: 12px;
    }

    .rule-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .rule-line b {
      color: var(--ink);
    }

    .exception-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .exception-form label:last-of-type,
    .exception-form .full {
      grid-column: 1 / -1;
    }

    .exception-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .exception-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .exception-item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .exception-item b {
      color: var(--ink);
    }

    .empty {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      header,
      main {
        display: grid;
        grid-template-columns: 1fr;
      }

      .today {
        justify-self: start;
      }

      .field-grid,
      .details,
      .exception-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>מחשבון שבתות</h1>
        <p class="subtitle">חישוב מהיר לפי הסדר הקבוע: 19-20/06/2026 אצל עדי, סוף השבוע שאחריו אצלך, ואז לסירוגין.</p>
      </div>
      <div class="today" id="todayLabel"></div>
    </header>

    <main>
      <section class="calculator" aria-labelledby="calcTitle">
        <h2 id="calcTitle">בדיקת תאריך</h2>
        <div class="field-grid">
          <label>
            תאריך לבדיקה
            <input id="checkDate" type="date" />
          </label>
          <button class="primary" id="calculateBtn">חשב</button>
        </div>

        <div class="quick-actions">
          <button id="todayBtn">היום</button>
          <button id="nextWeekendBtn">סופ"ש קרוב</button>
          <button id="plusWeekBtn">שבוע קדימה</button>
        </div>

        <div class="result" aria-live="polite">
          <div class="answer" id="answerBox">
            <span class="small" id="answerContext"></span>
            <strong id="ownerText"></strong>
            <span class="dates" id="weekendDates"></span>
          </div>

          <div class="details">
            <div class="metric">
              <span>שיטת חישוב</span>
              <b id="methodText"></b>
            </div>
            <div class="metric">
              <span>מרחק מנקודת הייחוס</span>
              <b id="weeksText"></b>
            </div>
            <div class="metric">
              <span>סוף השבוע הבא</span>
              <b id="nextOwnerText"></b>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="settingsTitle">
        <h2 id="settingsTitle">חגים וחריגים</h2>
        <div class="rules">
          <div class="rule-line">
            <span>נקודת ייחוס</span>
            <b>19-20/06/2026</b>
          </div>
          <div class="rule-line">
            <span>באותו סוף שבוע</span>
            <b>עדי</b>
          </div>
          <div class="rule-line">
            <span>סופי שבוע</span>
            <b>שישי-שבת</b>
          </div>
        </div>

        <form class="exception-form" id="exceptionForm">
          <label>
            מתאריך
            <input id="exceptionStart" type="date" required />
          </label>
          <label>
            עד תאריך
            <input id="exceptionEnd" type="date" required />
          </label>
          <label>
            אצל מי
            <select id="exceptionOwner">
              <option value="dad">אצלי</option>
              <option value="mom">עדי</option>
            </select>
          </label>
          <label>
            שם החריג
            <input id="exceptionName" type="text" placeholder="למשל: ראש השנה" required />
          </label>
          <button class="primary full" type="submit">הוסף חריג</button>
        </form>

        <div class="exception-list" id="exceptionList"></div>
      </section>
    </main>
  </div>

  <script>
    const baseWeekend = parseDate("2026-06-19");
    const owners = {
      dad: "אצלי",
      mom: "עדי"
    };

    const els = {
      todayLabel: document.querySelector("#todayLabel"),
      checkDate: document.querySelector("#checkDate"),
      calculateBtn: document.querySelector("#calculateBtn"),
      todayBtn: document.querySelector("#todayBtn"),
      nextWeekendBtn: document.querySelector("#nextWeekendBtn"),
      plusWeekBtn: document.querySelector("#plusWeekBtn"),
      answerBox: document.querySelector("#answerBox"),
      answerContext: document.querySelector("#answerContext"),
      ownerText: document.querySelector("#ownerText"),
      weekendDates: document.querySelector("#weekendDates"),
      methodText: document.querySelector("#methodText"),
      weeksText: document.querySelector("#weeksText"),
      nextOwnerText: document.querySelector("#nextOwnerText"),
      exceptionForm: document.querySelector("#exceptionForm"),
      exceptionStart: document.querySelector("#exceptionStart"),
      exceptionEnd: document.querySelector("#exceptionEnd"),
      exceptionOwner: document.querySelector("#exceptionOwner"),
      exceptionName: document.querySelector("#exceptionName"),
      exceptionList: document.querySelector("#exceptionList")
    };

    const formatter = new Intl.DateTimeFormat("he-IL", {
      weekday: "long",
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

    const compactFormatter = new Intl.DateTimeFormat("he-IL", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

    let exceptions = loadExceptions();

    initialize();

    function initialize() {
      const today = stripTime(new Date());
      els.todayLabel.textContent = `היום: ${formatter.format(today)}`;
      els.checkDate.value = toInputDate(today);
      calculate();
      renderExceptions();

      els.calculateBtn.addEventListener("click", calculate);
      els.checkDate.addEventListener("change", calculate);
      els.todayBtn.addEventListener("click", () => setDateAndCalculate(today));
      els.nextWeekendBtn.addEventListener("click", () => setDateAndCalculate(getWeekendFriday(today)));
      els.plusWeekBtn.addEventListener("click", () => {
        const current = parseDate(els.checkDate.value);
        current.setDate(current.getDate() + 7);
        setDateAndCalculate(current);
      });

      els.exceptionForm.addEventListener("submit", event => {
        event.preventDefault();
        const start = parseDate(els.exceptionStart.value);
        const end = parseDate(els.exceptionEnd.value);

        if (end < start) {
          els.exceptionEnd.setCustomValidity("תאריך הסיום צריך להיות אחרי תאריך ההתחלה");
          els.exceptionEnd.reportValidity();
          return;
        }

        els.exceptionEnd.setCustomValidity("");
        exceptions.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          start: els.exceptionStart.value,
          end: els.exceptionEnd.value,
          owner: els.exceptionOwner.value,
          name: els.exceptionName.value.trim()
        });
        saveExceptions();
        els.exceptionForm.reset();
        renderExceptions();
        calculate();
      });
    }

    function calculate() {
      const selected = parseDate(els.checkDate.value);
      if (!selected) return;

      const weekendFriday = getWeekendFriday(selected);
      const weekendSaturday = addDays(weekendFriday, 1);
      const weeksFromBase = Math.round((weekendFriday - baseWeekend) / (7 * 24 * 60 * 60 * 1000));
      const regularOwner = modulo(weeksFromBase, 2) === 0 ? "mom" : "dad";
      const matchedException = findException(weekendFriday, weekendSaturday, selected);
      const finalOwner = matchedException ? matchedException.owner : regularOwner;
      const nextWeekendOwner = getRegularOwner(addDays(weekendFriday, 7));

      els.answerBox.className = `answer ${finalOwner === "mom" ? "mom" : ""} ${matchedException ? "exception" : ""}`;
      els.answerContext.textContent = matchedException
        ? `לפי חריג: ${matchedException.name}`
        : selectedIsWeekend(selected) ? "התאריך בתוך סוף השבוע הזה" : "סוף השבוע הקרוב לתאריך";
      els.ownerText.textContent = owners[finalOwner];
      els.weekendDates.textContent = `${compactFormatter.format(weekendFriday)} - ${compactFormatter.format(weekendSaturday)}`;
      els.methodText.textContent = matchedException ? "חריג / חג" : "סדר קבוע";
      els.weeksText.textContent = weeksFromBase === 0 ? "שבוע הייחוס" : `${Math.abs(weeksFromBase)} שבועות ${weeksFromBase > 0 ? "אחרי" : "לפני"}`;
      els.nextOwnerText.textContent = owners[nextWeekendOwner];
    }

    function getRegularOwner(friday) {
      const weeks = Math.round((friday - baseWeekend) / (7 * 24 * 60 * 60 * 1000));
      return modulo(weeks, 2) === 0 ? "mom" : "dad";
    }

    function getWeekendFriday(date) {
      const day = date.getDay();
      const friday = stripTime(new Date(date));

      if (day === 5) return friday;
      if (day === 6) {
        friday.setDate(friday.getDate() - 1);
        return friday;
      }

      const daysUntilFriday = modulo(5 - day, 7);
      friday.setDate(friday.getDate() + daysUntilFriday);
      return friday;
    }

    function selectedIsWeekend(date) {
      return date.getDay() === 5 || date.getDay() === 6;
    }

    function findException(friday, saturday, selected) {
      return exceptions.find(item => {
        const start = parseDate(item.start);
        const end = parseDate(item.end);
        return rangesOverlap(friday, saturday, start, end) || (selected >= start && selected <= end);
      });
    }

    function rangesOverlap(aStart, aEnd, bStart, bEnd) {
      return aStart <= bEnd && bStart <= aEnd;
    }

    function renderExceptions() {
      els.exceptionList.innerHTML = "";

      if (exceptions.length === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "אין חריגים שמורים.";
        els.exceptionList.append(empty);
        return;
      }

      exceptions
        .slice()
        .sort((a, b) => parseDate(a.start) - parseDate(b.start))
        .forEach(item => {
          const row = document.createElement("div");
          row.className = "exception-item";

          const text = document.createElement("p");
          text.innerHTML = `<b>${escapeHtml(item.name)}</b><br>${compactFormatter.format(parseDate(item.start))} - ${compactFormatter.format(parseDate(item.end))} · ${owners[item.owner]}`;

          const button = document.createElement("button");
          button.className = "danger";
          button.type = "button";
          button.textContent = "מחק";
          button.addEventListener("click", () => {
            exceptions = exceptions.filter(exception => exception.id !== item.id);
            saveExceptions();
            renderExceptions();
            calculate();
          });

          row.append(text, button);
          els.exceptionList.append(row);
        });
    }

    function loadExceptions() {
      try {
        return JSON.parse(localStorage.getItem("shabbatCalculatorExceptions") || "[]");
      } catch {
        return [];
      }
    }

    function saveExceptions() {
      localStorage.setItem("shabbatCalculatorExceptions", JSON.stringify(exceptions));
    }

    function parseDate(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function toInputDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(date, days) {
      const next = stripTime(new Date(date));
      next.setDate(next.getDate() + days);
      return next;
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function modulo(value, divisor) {
      return ((value % divisor) + divisor) % divisor;
    }

    function setDateAndCalculate(date) {
      els.checkDate.value = toInputDate(date);
      calculate();
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
